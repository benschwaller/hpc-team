name: Publish Python package to PyPI

on:
  workflow_call:
    secrets:
      PYPI_PUBLISH_TOKEN:
        required: true
        description: "API token for authenticating and publishing to PyPI"

jobs:
  build:
    name: Build package
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        run: sudo snap install astral-uv --classic

      - name: Build
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish package
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install uv
        run: sudo snap install astral-uv --classic

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_PUBLISH_TOKEN }}
        run: uv publish
